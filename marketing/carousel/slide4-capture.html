<!doctype html><html lang="en"><head><meta charset="utf-8"><title>slide4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  * { margin:0; box-sizing:border-box; }
  body { width:1200px; height:750px; overflow:hidden; background:#faf6ef; color:#221d16;
         font-family:'Inter',sans-serif; display:flex; flex-direction:column; align-items:center;
         justify-content:center; gap:40px; }
  h1 { font-family:'Fraunces',serif; font-weight:600; font-size:54px; letter-spacing:-0.02em; text-align:center; }
  .grid { display:grid; grid-template-columns:repeat(2, 420px); gap:20px; }
  .card { border:1.5px solid #e5dcc9; border-radius:20px; padding:26px 28px; display:flex; gap:18px; align-items:center; }
  .card .icon { font-size:38px; }
  .card .t { font-size:21px; font-weight:600; }
  .card .s { font-size:16px; color:#57503f; margin-top:3px; }
  .g1 { background:#ece4d2; } .g2 { background:#dfe8e4; } .g3 { background:#e4e8d4; } .g4 { background:#f3e0d0; }

</style></head><body>
  <h1>Capture the meeting however it happens.</h1>
  <div class="grid">
    <div class="card g1"><span class="icon">🎙️</span><div><div class="t">Record the room</div><div class="s">in-person meetings and voice memos</div></div></div>
    <div class="card g2"><span class="icon">🖥️</span><div><div class="t">Record a meeting tab</div><div class="s">Zoom or Meet in the browser, no bots</div></div></div>
    <div class="card g3"><span class="icon">📁</span><div><div class="t">Upload a recording</div><div class="s">mp3, wav, m4a, webm, ogg</div></div></div>
    <div class="card g4"><span class="icon">📋</span><div><div class="t">Paste a transcript</div><div class="s">skip straight to AI notes</div></div></div>
  </div>
  <div class="foot">Sard (سرد) · sard.alaasi.dev</div>
</body></html>
